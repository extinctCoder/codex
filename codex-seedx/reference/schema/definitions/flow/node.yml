# yaml-language-server: $schema=../../aggregate-schema.json

tables:
  - name: sink_nodes
    if_not_exists: true
    x_sink: { aggregate: flow, entity: node }
    columns:
      flow_id: { type: uuid, x_role: Id }
      node_id: { type: uuid, x_role: Reference }
      title: { type: text, default: "''" }
      description: { type: text, default: "''" }
      icon: { type: text, default: "''" }
      color: { type: text, default: "''" }
      layout: { type: jsonb, "null": true }
      is_deleted: { type: boolean, default: "false" }
    primary_key: { name: sink_nodes_pkey, columns: [ flow_id, node_id ] }
    indexes:
      - {
          name: index_sink_nodes_title_trgm,
          columns: [ "title gin_trgm_ops" ],
          using: gin,
        }
      - {
          name: index_sink_nodes_description_trgm,
          columns: [ "description gin_trgm_ops" ],
          using: gin,
        }

  - name: snap_nodes
    if_not_exists: true
    x_entity: { aggregate: flow, name: node, as: nodes }
    x_partials: [ versioned_audit ]
    columns:
      flow_id: { type: uuid, x_role: Id }
      node_id: { type: uuid, x_role: Reference }
      node_key: { type: text }
      node_type: { type: node_type }
      parent_node_id: { type: uuid, "null": true }
      slot: { type: text, default: "'root'" }
      slot_key: { type: text, "null": true }
      body_type: { type: node_body_type, default: "'Empty'" }
      source: { type: text, "null": true }
      disburse_method: { type: disburse_method, "null": true }
      batch_size: { type: bigint, "null": true }
      max_iterations: { type: integer, "null": true }
      prompt: { type: text, "null": true }
      parameters: { type: jsonb, "null": true }
      transformations: { type: jsonb, "null": true }
      schema: { type: jsonb, "null": true }
    primary_key: { name: snap_nodes_pkey, columns: [ flow_id, version, node_id ] }
    indexes:
      - {
          name: index_snap_nodes_flow_version,
          columns: [ flow_id, version ],
          where: "is_deleted = false",
        }
      - { name: index_snap_nodes_node_type, columns: [ node_type ] }
      - { name: index_snap_nodes_flow_id_node_key, columns: [ flow_id, node_key ] }
      - { name: index_snap_nodes_correlation_id, columns: [ correlation_id ] }
      - {
          name: index_snap_nodes_parent_node_id,
          columns: [ parent_node_id ],
          where: "parent_node_id IS NOT NULL",
        }
      - {
          name: index_snap_nodes_node_key_trgm,
          columns: [ "node_key gin_trgm_ops" ],
          using: gin,
        }

views:
  - name: nodes
    or_replace: true
    x_entity: { aggregate: flow, name: node, list: default }
    select:
      - { column: flow_id, from: latest_entity, x_role: Id, x_filterable: true }
      - {
          column: node_id,
          from: latest_entity,
          as: id,
          x_role: Reference,
          x_filterable: true,
        }
      - {
          column: identity_project_id,
          from: flow,
          x_filterable: true,
          x_selectable: false,
        }
      - {
          column: node_key,
          from: latest_entity,
          x_filterable: true,
          x_searchable: true,
        }
      - { column: node_type, from: latest_entity, x_filterable: true }
      - { column: parent_node_id, from: latest_entity, x_selectable: false }
      - { column: slot, from: latest_entity, x_selectable: false }
      - { column: slot_key, from: latest_entity, x_selectable: false }
      - { column: body_type, from: latest_entity, x_filterable: true }
      - { column: source, from: latest_entity }
      - { column: disburse_method, from: latest_entity }
      - { column: batch_size, from: latest_entity }
      - { column: max_iterations, from: latest_entity }
      - { column: prompt, from: latest_entity }
      - { column: parameters, from: latest_entity }
      - { column: transformations, from: latest_entity }
      - { column: schema, from: latest_entity }
      - { column: title, from: sink, x_filterable: true, x_searchable: true }
      - { column: description, from: sink, x_filterable: true, x_searchable: true }
      - { column: icon, from: sink }
      - { column: color, from: sink }
      - { column: layout, from: sink }
      - { column: version, from: latest_entity, x_filterable: true }
      - { column: correlation_id, from: latest_entity, x_filterable: true }
      - {
          column: occurred_at,
          from: latest_entity,
          as: updated_at,
          x_filterable: true,
        }
      - { column: actor_type, from: latest_entity, as: updated_by_type }
      - { column: actor_id, from: latest_entity, as: updated_by_id }
      - {
          column: occurred_at,
          from: first_entity,
          as: created_at,
          x_filterable: true,
        }
      - { column: actor_type, from: first_entity, as: created_by_type }
      - { column: actor_id, from: first_entity, as: created_by_id }
    from: { table: snap_nodes, as: latest_entity }
    join:
      - table: flows
        as: flow
        "on": "latest_entity.flow_id = flow.id AND latest_entity.version = flow.version"
      - subquery:
          select: "flow_id, node_id, occurred_at, actor_type, actor_id"
          from: snap_nodes
          distinct_on: [ flow_id, node_id ]
          order_by: "flow_id, node_id, version ASC"
        as: first_entity
        "on": "latest_entity.flow_id = first_entity.flow_id AND latest_entity.node_id =
          first_entity.node_id"
      - table: sink_nodes
        as: sink
        type: left
        "on": "latest_entity.flow_id = sink.flow_id AND latest_entity.node_id =
          sink.node_id"
    where: "latest_entity.is_deleted = false"
