# yaml-language-server: $schema=../aggregate-schema.json

tables:
  - name: snap_node_executions
    if_not_exists: true
    x_aggregate: { name: node_execution }
    x_partials: [ versioned_audit ]
    columns:
      node_execution_id: { type: uuid, x_role: Id }
      execution_id: { type: uuid }
      flow_id: { type: uuid }
      identity_project_id: { type: text, default: "''" }
      node_id: { type: uuid }
      node_key: { type: text }
      node_type: { type: node_type }
      status: { type: execution_status }
      parent_type:
        {
          type: node_execution_parent_type,
          default: "'Root'::node_execution_parent_type",
        }
      parent_id: { type: uuid, "null": true }
      loop_index: { type: bigint, "null": true }
      directive:
        {
          type: node_execution_directive,
          default: "'Standard'::node_execution_directive",
        }
      submitted_data: { type: jsonb, "null": true }
      evaluation_type:
        {
          type: node_execution_evaluation_type,
          default: "'Standard'::node_execution_evaluation_type",
        }
      evaluation: { type: jsonb, "null": true }
      output: { type: jsonb, "null": true }
      start_time: { type: timestamptz, "null": true }
      end_time: { type: timestamptz, "null": true }
    primary_key: { name: snap_node_executions_pkey, columns: [ node_execution_id, version ] }
    indexes:
      - {
          name: index_snap_node_executions_latest,
          columns: [ node_execution_id, "version DESC" ],
          where: "is_deleted = false",
        }
      - { name: index_snap_node_executions_execution_id, columns: [ execution_id ] }
      - {
          name: index_snap_node_executions_execution_id_node_key,
          columns: [ execution_id, node_key ],
        }
      - { name: index_snap_node_executions_status, columns: [ status ] }
      - {
          name: index_snap_node_executions_identity_project_id_status,
          columns: [ identity_project_id, status ],
        }
      - {
          name: index_snap_node_executions_flow_id_node_type,
          columns: [ flow_id, node_type ],
        }
      - {
          name: index_snap_node_executions_correlation_id,
          columns: [ correlation_id ],
        }
      - { name: index_snap_node_executions_node_id, columns: [ node_id ] }
      - { name: index_snap_node_executions_parent_id, columns: [ parent_id ] }

views:
  - name: node_executions
    or_replace: true
    x_aggregate: { name: node_execution, list: default }
    select:
      - {
          column: node_execution_id,
          from: latest_version,
          as: id,
          x_role: Id,
          x_filterable: true,
        }
      - {
          column: execution_id,
          from: latest_version,
          x_role: Reference,
          x_filterable: true,
          x_selectable: false,
        }
      - {
          column: flow_id,
          from: latest_version,
          x_role: Reference,
          x_filterable: true,
          x_selectable: false,
        }
      - { column: identity_project_id, from: latest_version, x_selectable: false }
      - {
          column: node_id,
          from: latest_version,
          x_role: Reference,
          x_filterable: true,
        }
      - {
          column: node_key,
          from: latest_version,
          x_filterable: true,
          x_searchable: true,
        }
      - { column: node_type, from: latest_version, x_filterable: true }
      - { column: status, from: latest_version, x_filterable: true }
      - { column: parent_type, from: latest_version, x_filterable: true }
      - {
          column: parent_id,
          from: latest_version,
          x_role: Reference,
          x_filterable: true,
        }
      - { column: loop_index, from: latest_version, x_filterable: true }
      - { column: directive, from: latest_version, x_filterable: true }
      - { column: evaluation_type, from: latest_version, x_filterable: true }
      - { column: start_time, from: latest_version, x_filterable: true }
      - { column: end_time, from: latest_version, x_filterable: true }
      - { column: version, from: latest_version, x_filterable: true }
      - { column: correlation_id, from: latest_version, x_filterable: true }
      - {
          column: occurred_at,
          from: latest_version,
          as: updated_at,
          x_filterable: true,
        }
      - { column: actor_type, from: latest_version, as: updated_by_type }
      - { column: actor_id, from: latest_version, as: updated_by_id }
      - {
          column: occurred_at,
          from: first_version,
          as: created_at,
          x_filterable: true,
        }
      - { column: actor_type, from: first_version, as: created_by_type }
      - { column: actor_id, from: first_version, as: created_by_id }
    from:
      subquery:
        select: "*"
        from: snap_node_executions
        distinct_on: [ node_execution_id ]
        where: "is_deleted = false"
        order_by: "node_execution_id, version DESC"
      as: latest_version
    join:
      - subquery:
          select: "node_execution_id, occurred_at, actor_type, actor_id"
          from: snap_node_executions
          distinct_on: [ node_execution_id ]
          order_by: "node_execution_id, version ASC"
        as: first_version
        "on": "latest_version.node_execution_id = first_version.node_execution_id"

  - name: node_execution_io
    or_replace: true
    x_entity: { aggregate: node_execution, name: io, list: default }
    select:
      - {
          column: node_execution_id,
          from: latest_entity,
          as: id,
          x_role: Id,
          x_filterable: true,
        }
      - { column: identity_project_id, from: latest_entity, x_selectable: false }
      - {
          column: node_id,
          from: latest_entity,
          x_role: Reference,
          x_filterable: true,
        }
      - { column: node_type, from: latest_entity, x_filterable: true }
      - { column: body_type, from: node, x_filterable: true }
      - { column: status, from: latest_entity, x_filterable: true }
      - { column: start_time, from: latest_entity, x_filterable: true }
      - { column: end_time, from: latest_entity, x_filterable: true }
      - { column: source, from: node }
      - { column: disburse_method, from: node, x_filterable: true }
      - { column: batch_size, from: node, x_filterable: true }
      - { column: max_iterations, from: node, x_filterable: true }
      - { column: prompt, from: node }
      - { column: parameters, from: node }
      - { column: transformations, from: node }
      - { column: schema, from: node }
      - { column: output, from: latest_entity }
      - { column: evaluation, from: latest_entity }
      - { column: submitted_data, from: latest_entity }
    from:
      subquery:
        select: "*"
        from: snap_node_executions
        distinct_on: [ node_execution_id ]
        where: "is_deleted = false"
        order_by: "node_execution_id, version DESC"
      as: latest_entity
    join:
      - table: nodes
        as: node
        type: left
        "on": "latest_entity.flow_id = node.flow_id AND latest_entity.node_id = node.id"

  - name: deleted_node_executions
    or_replace: true
    x_aggregate: { name: node_execution, list: deleted }
    distinct_on: [ node_execution_id ]
    select:
      - {
          column: node_execution_id,
          from: snap,
          as: id,
          x_role: Id,
          x_filterable: true,
        }
      - {
          column: execution_id,
          from: snap,
          x_role: Reference,
          x_filterable: true,
          x_selectable: false,
        }
      - {
          column: flow_id,
          from: snap,
          x_role: Reference,
          x_filterable: true,
          x_selectable: false,
        }
      - { column: identity_project_id, from: snap, x_selectable: false }
      - { column: status, from: snap, x_filterable: true }
      - { column: actor_type, from: snap, as: deleted_by_type }
      - { column: actor_id, from: snap, as: deleted_by_id }
      - { column: occurred_at, from: snap, as: deleted_at, x_filterable: true }
    from: { table: snap_node_executions, as: snap }
    where: "is_deleted = true"
    order_by: "node_execution_id, version DESC"
